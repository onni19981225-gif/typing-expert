<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小亞諾英文單字王</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="menu-toggle" id="menuBtn">☰</button>
    
    <div id="sidebar">
        <div class="sidebar-header"><span style="font-weight: bold; color: var(--primary);">🐳 冒險選單</span></div>
        <div class="sidebar-content">
            <button class="btn" id="easyBtn">🌱 簡單模式</button>
            <button class="btn" id="normalBtn">🌿 基礎模式</button>
            <button class="btn" id="hardBtn">🌳 困難模式</button>
        </div>
    </div>

    <div id="main-view">
        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
        </div>
        <div id="word-area" style="display:none; text-align: center;">
            <div id="word-display" style="font-size: 5rem; margin-bottom: 20px;"></div>
            <div id="translation-display" style="font-size: 2rem; color: #666; margin-bottom: 20px;"></div>
            <input type="text" id="input-box" autocomplete="off" style="font-size: 2rem; padding: 10px; border-radius: 10px;" inputmode="none">
        </div>
    </div>

    <script type="module">
        // 加上 .js 副檔名是 GitHub Pages 能跑的關鍵
        import { initEngine, startMode } from './gameEngine.js';
        import { toggleSidebar } from './uiController.js';

        // 初始化
        initEngine();

        // 綁定事件 (這比 onclick 穩 100 倍)
        document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
        document.getElementById('easyBtn').addEventListener('click', () => startMode('easy'));
        document.getElementById('normalBtn').addEventListener('click', () => startMode('normal'));
        document.getElementById('hardBtn').addEventListener('click', () => startMode('hard'));

        console.log("小亞諾系統已完全載入");
    </script>
</body>
</html>
